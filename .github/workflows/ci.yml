name: Churnaut CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      NEXT_PUBLIC_SNIPPET_CDN_URL: https://placeholder.com
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-not-a-real-key
      UPSTASH_REDIS_REST_URL: https://placeholder-redis.upstash.io
      UPSTASH_REDIS_REST_TOKEN: placeholder-token
      CRON_SECRET: placeholder-cron-secret
      ENCRYPTION_KEY: placeholder-encryption-key-must-be-long-32-chars
      LEMONSQUEEZY_WEBHOOK_SECRET: placeholder-lemonsqueezy-webhook-secret
      RESEND_API_KEY: placeholder-resend-api-key
      TOGETHER_API_KEY: placeholder-together-api-key


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application (runs typecheck and lint)
        run: npm run build

      - name: Run Vitest unit tests
        run: npm test
