<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churnaut Integration Test Page</title>
    <!-- Churnaut Integration Code -->
    <script>window.SR_CLIENT_ID = '9b6d3521-e9c0-4ff9-8aa5-7f84dd53788f';</script>
    <script src="/snippet.js" async defer></script>
    <style>
        body {
            background-color: #080B0F;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background-color: #0d1117;
            border: 1px solid #1a1f2e;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 16px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p.sr-target {
            color: #9ca3af;
            font-size: 15px;
            line-height: 1.5;
            margin: 20px 0;
            font-family: monospace;
            padding: 12px;
            background: #080B0F;
            border-radius: 6px;
            border: 1px dashed #1a1f2e;
        }
        .cta-container {
            margin-top: 24px;
            padding: 12px;
            background: #080B0F;
            border-radius: 6px;
            border: 1px dashed #1a1f2e;
        }
        .btn {
            background-color: #6366f1;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn:hover {
            background-color: #4f46e5;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .badge {
            display: inline-block;
            background-color: #1a1f2e;
            color: #6366f1;
            font-family: monospace;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Churnaut Test Env</div>
        <h1>Welcome to our website</h1>
        
        <p class="sr-target" id="headline">Generic headline for everyone</p>
        
        <div class="sr-target cta-container" id="main-cta">
            <button class="btn">Book a Demo - 24hr response time</button>
        </div>
    </div>
</body>
